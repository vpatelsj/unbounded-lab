# NVIDIA DCGM exporter — pinned to Spark GPU nodes only.
# Chart: nvidia/dcgm-exporter
#
# Default exporter mode is "embedded" (no -r arg): the binary links libdcgm
# directly and talks to the driver via NVML/CDI. That's what works on Spark.
#
# DCGM on Spark GB10 (Tegra/integrated GPU) does NOT export memory fields
# (DCGM_FI_DEV_FB_USED/FREE/TOTAL): those are silently absent even with the
# DCP counter set. MEM_COPY_UTIL is technically exposed but stays at 0
# even under heavy load (the underlying counter needs a DCGM module that
# isn't loaded on Tegra). Working metrics on this hardware: GPU_UTIL,
# POWER_USAGE, GPU_TEMP, MEMORY_TEMP, SM_CLOCK, TOTAL_ENERGY_CONSUMPTION.
# The bench harness uses POWER_USAGE peak as the "GPU was busy" signal;
# the Grafana dashboard uses rate(vllm:generation_tokens_total) as the
# most direct view of engine throughput.

nodeSelector:
  lab.unbounded.cloud/hardware-class: dgx-spark-gb10

tolerations:
  - operator: Exists

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

# Static scrape config in values-kube-prometheus-stack.yaml picks this up.
# Don't also create a ServiceMonitor; otherwise we'd double-scrape.
serviceMonitor:
  enabled: false

service:
  enabled: true
  type: ClusterIP
