apiVersion: v1
kind: Namespace
metadata:
  name: lab-observability
  labels:
    lab.unbounded.cloud/wave: "1"
    lab.unbounded.cloud/wave-item: W1.5
    lab.unbounded.cloud/role: observability
    # Allow Prometheus to scrape pods in this namespace and reach
    # cross-namespace ServiceMonitors via its global discovery.
    pod-security.kubernetes.io/enforce: privileged
