# kube-prometheus-stack values for the Unbounded Lab.
# Chart: prometheus-community/kube-prometheus-stack
#
# Scope choices for W1.5:
# - Single Prometheus + Grafana on the AKS system pool (cheap amd64 nodes).
# - DaemonSets (kube-state-metrics, node-exporter) cover both AKS pool nodes
#   AND the ARM64 Sparks; node-exporter is multi-arch so this works.
# - DCGM exporter is a *separate* chart (NVIDIA) installed only on Sparks
#   via nodeSelector. We point Prometheus at it through an additional scrape
#   config (see additionalScrapeConfigs at the bottom of this file).
# - No public ingress for Grafana yet — port-forward only. Public Grafana with
#   shared auth is W1.4-style work and would expand the auth surface; defer.
# - Persistent storage on Azure Disk (default storage class on AKS) so a node
#   reboot doesn't lose history; size kept small (10 Gi) since this is a lab.
#
# After bumping chart version, regenerate the lock by re-running
# `make w1.5-up` and commit the new values delta. See observability/README.md.

# Pin everything that runs *control-plane-side* to the AKS system pool. The
# Sparks are GPU nodes and we don't want a Prometheus pod competing for the
# unified memory budget that vLLM is already on the edge of.
defaultRules:
  create: true
  rules:
    # Many of these rely on cAdvisor/kubelet metrics that DGX OS gates; don't
    # noise the Alertmanager with false alerts on Spark-class kernels until
    # W1.5 has measured what actually fires.
    kubeProxy: false

# kube-state-metrics: cluster-wide metadata.
kube-state-metrics:
  nodeSelector:
    kubernetes.io/arch: amd64
    kubernetes.azure.com/mode: system
  tolerations:
    - operator: Exists

# node-exporter: per-node host metrics. Multi-arch image; runs on Sparks
# *and* the AKS pools. This is the W1.5 deliverable line "Node-exporter on
# each node for host-level metrics."
prometheus-node-exporter:
  hostNetwork: true
  tolerations:
    - operator: Exists
  # Don't change the default DaemonSet selector — it must include arm64 nodes.

# Prometheus itself.
prometheus:
  ingress:
    enabled: false
  prometheusSpec:
    nodeSelector:
      kubernetes.io/arch: amd64
      kubernetes.azure.com/mode: system
    tolerations:
      - operator: Exists
    # Catch-all for ServiceMonitors / PodMonitors / Probes the lab adds in
    # other namespaces. Without these the W1.5 dashboard doesn't see W1.1 or
    # W1.2 metrics, which is the whole point of having Prometheus in the lab.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    probeNamespaceSelector: {}
    ruleNamespaceSelector: {}
    retention: 14d
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          # Use the AKS default storage class (Azure Disk).
          storageClassName: default
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 10Gi
    # NVIDIA DCGM exporter does not ship a ServiceMonitor by default in
    # the chart we use; static config below points Prometheus at it.
    additionalScrapeConfigs:
      - job_name: dcgm-exporter
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [lab-observability]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: dcgm-exporter
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "9400"
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: instance

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      kubernetes.io/arch: amd64
      kubernetes.azure.com/mode: system
    tolerations:
      - operator: Exists
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: default
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi

prometheusOperator:
  nodeSelector:
    kubernetes.io/arch: amd64
    kubernetes.azure.com/mode: system
  tolerations:
    - operator: Exists
  admissionWebhooks:
    patch:
      nodeSelector:
        kubernetes.io/arch: amd64
        kubernetes.azure.com/mode: system

grafana:
  enabled: true
  nodeSelector:
    kubernetes.io/arch: amd64
    kubernetes.azure.com/mode: system
  tolerations:
    - operator: Exists
  # Initial admin password is generated by helm; retrieve with:
  #   kubectl -n lab-observability get secret lab-obs-grafana \
  #     -o jsonpath='{.data.admin-password}' | base64 -d; echo
  # Public ingress with shared auth is intentionally deferred; port-forward
  # gates access today.
  service:
    type: ClusterIP
  persistence:
    enabled: true
    storageClassName: default
    size: 5Gi
  # Pre-load the Unbounded Lab dashboard from a ConfigMap. The chart picks
  # up any ConfigMap in the release namespace with the
  # `grafana_dashboard: "1"` label and registers each `*.json` key as a
  # dashboard. See observability/dashboards/.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
      provider:
        allowUiUpdates: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
