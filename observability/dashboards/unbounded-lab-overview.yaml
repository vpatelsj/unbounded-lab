apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-overview-dashboard
  namespace: lab-observability
  labels:
    grafana_dashboard: "1"
    lab.unbounded.cloud/wave: "1"
    lab.unbounded.cloud/wave-item: W1.5
data:
  unbounded-lab-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "row",
          "title": "Spark GPU (DCGM)",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false,
          "id": 1
        },
        {
          "type": "timeseries",
          "title": "GPU utilization % per Spark",
          "id": 2,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "GPU framebuffer used (GiB)",
          "id": 3,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED / 1024",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decgbytes"}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "GPU power (W)",
          "id": 4,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "watt"}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "GPU temperature (\u00b0C)",
          "id": 5,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "celsius"}, "overrides": []}
        },
        {
          "type": "row",
          "title": "Cluster",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17},
          "collapsed": false,
          "id": 10
        },
        {
          "type": "stat",
          "title": "Nodes Ready",
          "id": 11,
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Pods Running (lab-*)",
          "id": 12,
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_pod_status_phase{phase=\"Running\",namespace=~\"lab-.*\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Pods Failed (lab-*)",
          "id": 13,
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_pod_status_phase{phase=\"Failed\",namespace=~\"lab-.*\"})", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []}
        },
        {
          "type": "stat",
          "title": "Container restarts last 24h (lab-*)",
          "id": 14,
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"lab-.*\"}[24h]))", "refId": "A"}
          ]
        },
        {
          "type": "row",
          "title": "Spark host",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
          "collapsed": false,
          "id": 20
        },
        {
          "type": "timeseries",
          "title": "Memory used % (Sparks)",
          "id": 21,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) and on(instance) kube_node_labels{label_lab_unbounded_cloud_hardware_class=\"dgx-spark-gb10\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Buff/cache GiB (Sparks) \u2014 the W1.2 unreclaimable-cache pain",
          "id": 22,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "(node_memory_Buffers_bytes + node_memory_Cached_bytes) / 1024 / 1024 / 1024",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decgbytes"}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "PVC used (lab-*)",
          "id": 30,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 31},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=~\"lab-.*\"} / 1024 / 1024 / 1024",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decgbytes"}, "overrides": []}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["unbounded-lab", "wave-1"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Unbounded Lab \u2014 Overview",
      "uid": "unbounded-lab-overview",
      "version": 1,
      "weekStart": ""
    }
