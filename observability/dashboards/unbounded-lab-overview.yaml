apiVersion: v1
kind: ConfigMap
metadata:
  name: lab-overview-dashboard
  namespace: lab-observability
  labels:
    grafana_dashboard: "1"
    lab.unbounded.cloud/wave: "1"
    lab.unbounded.cloud/wave-item: W1.5
data:
  unbounded-lab-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "type": "row",
          "title": "Spark GPU (DCGM)",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "collapsed": false,
          "id": 1
        },
        {
          "type": "timeseries",
          "title": "GPU utilization % per Spark",
          "id": 2,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "vLLM decode throughput (tokens/s)",
          "description": "rate(vllm:generation_tokens_total[1m]) per model. The dashboard's other GPU activity proxies are limited on Spark Tegra: DCGM_FI_DEV_MEM_COPY_UTIL and FB_USED are not exposed (DCP profiling counters), and POWER_USAGE only varies between ~32 W idle and ~36 W loaded. This panel is the most direct view of \"is the engine actually doing work\".",
          "id": 3,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "rate(vllm:generation_tokens_total[1m])",
              "legendFormat": "{{model_name}} ({{pod}})",
              "refId": "A"
            },
            {
              "expr": "rate(vllm:prompt_tokens_total[1m])",
              "legendFormat": "prompt {{pod}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "none", "min": 0}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "GPU power (W)",
          "id": 4,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "watt"}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "GPU temperature (\u00b0C)",
          "id": 5,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "celsius"}, "overrides": []}
        },
        {
          "type": "row",
          "title": "Cluster",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 17},
          "collapsed": false,
          "id": 10
        },
        {
          "type": "stat",
          "title": "Nodes Ready",
          "id": 11,
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Pods Running (lab-*)",
          "id": 12,
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_pod_status_phase{phase=\"Running\",namespace=~\"lab-.*\"})", "refId": "A"}
          ]
        },
        {
          "type": "stat",
          "title": "Pods Failed (lab-*)",
          "id": 13,
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(kube_pod_status_phase{phase=\"Failed\",namespace=~\"lab-.*\"})", "refId": "A"}
          ],
          "fieldConfig": {"defaults": {"thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}, "overrides": []}
        },
        {
          "type": "stat",
          "title": "Container restarts last 24h (lab-*)",
          "id": 14,
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 18},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"lab-.*\"}[24h]))", "refId": "A"}
          ]
        },
        {
          "type": "row",
          "title": "Spark host",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 22},
          "collapsed": false,
          "id": 20
        },
        {
          "type": "timeseries",
          "title": "Memory used % (Sparks)",
          "id": 21,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * on(instance) group_left(nodename) node_uname_info{nodename=~\"spark-.*\"}",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0, "max": 100}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "Buff/cache GiB (Sparks) \u2014 the W1.2 unreclaimable-cache pain",
          "id": 22,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 23},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "((node_memory_Buffers_bytes + node_memory_Cached_bytes) / 1024 / 1024 / 1024) * on(instance) group_left(nodename) node_uname_info{nodename=~\"spark-.*\"}",
              "legendFormat": "{{nodename}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decgbytes"}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "vLLM KV cache usage % \u2014 the engine view of the same pressure",
          "description": "vllm:kv_cache_usage_perc is what vLLM thinks of its own KV pool. Read alongside the host Memory used % and Buff/cache panels: when host buff/cache climbs, vLLM's kv pool starts shrinking under preemption/eviction. That divergence is the W1.3 unreclaimable-cache pain.",
          "id": 23,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 31},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "vllm:kv_cache_usage_perc * 100",
              "legendFormat": "{{model_name}} ({{pod}})",
              "refId": "A"
            },
            {
              "expr": "vllm:num_requests_running",
              "legendFormat": "running ({{pod}})",
              "refId": "B"
            },
            {
              "expr": "vllm:num_requests_waiting",
              "legendFormat": "waiting ({{pod}})",
              "refId": "C"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "percent", "min": 0}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "PVC used (lab-*)",
          "id": 30,
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 39},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=~\"lab-.*\"} / 1024 / 1024 / 1024",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "decgbytes"}, "overrides": []}
        },
        {
          "type": "row", "collapsed": false,
          "title": "vLLM live serving (W1.7 bench window)",
          "id": 40,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 47}
        },
        {
          "type": "timeseries",
          "title": "vLLM concurrency \u2014 running vs waiting requests",
          "description": "Tracks the bench harness's concurrency phase. During W1.7 the running line steps 1\u21922\u21924\u21928\u219216\u219232\u219248\u219264. If 'waiting' grows above zero, the engine is queueing \u2014 that's the knee.",
          "id": 41,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 48},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "vllm:num_requests_running", "legendFormat": "running ({{pod}})", "refId": "A"},
            {"expr": "vllm:num_requests_waiting", "legendFormat": "waiting ({{pod}})", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "short", "min": 0}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "vLLM TTFT \u2014 time to first token (p50/p95/p99)",
          "description": "vllm:time_to_first_token_seconds histogram. Prefill cost; rises with prompt length and queueing. The W1.7 harness reports the same value from the client side.",
          "id": 42,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 48},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket[1m])))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket[1m])))", "legendFormat": "p95", "refId": "B"},
            {"expr": "histogram_quantile(0.99, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket[1m])))", "legendFormat": "p99", "refId": "C"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "min": 0}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "vLLM inter-token latency / TPOT (p50/p95)",
          "description": "vllm:time_per_output_token_seconds histogram. The 'fluency-per-token' the user feels under streaming. Should rise with concurrency as the batch shares decode budget.",
          "id": 43,
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 56},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(vllm:time_per_output_token_seconds_bucket[1m]))) * 1000", "legendFormat": "p50 (ms)", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:time_per_output_token_seconds_bucket[1m]))) * 1000", "legendFormat": "p95 (ms)", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "ms", "min": 0}, "overrides": []}
        },
        {
          "type": "timeseries",
          "title": "vLLM queue time (p50/p95) \u2014 backpressure signal",
          "description": "vllm:request_queue_time_seconds. Time a request waits before it enters RUNNING. Stays near 0 below the knee; spikes when continuous batching can't admit the next request immediately.",
          "id": 44,
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 56},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "histogram_quantile(0.50, sum by (le) (rate(vllm:request_queue_time_seconds_bucket[1m])))", "legendFormat": "p50", "refId": "A"},
            {"expr": "histogram_quantile(0.95, sum by (le) (rate(vllm:request_queue_time_seconds_bucket[1m])))", "legendFormat": "p95", "refId": "B"}
          ],
          "fieldConfig": {"defaults": {"unit": "s", "min": 0}, "overrides": []}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["unbounded-lab", "wave-1"],
      "templating": {"list": []},
      "time": {"from": "now-1h", "to": "now"},
      "timepicker": {},
      "timezone": "",
      "title": "Unbounded Lab \u2014 Overview",
      "uid": "unbounded-lab-overview",
      "version": 1,
      "weekStart": ""
    }
