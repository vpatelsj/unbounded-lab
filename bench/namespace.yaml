apiVersion: v1
kind: Namespace
metadata:
  name: lab-bench
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lab-bench-results
  namespace: lab-bench
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: default
  resources:
    requests:
      storage: 1Gi
