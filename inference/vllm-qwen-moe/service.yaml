apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: lab-vllm-qwen-moe
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: qwen-moe
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: qwen-moe
  ports:
    # Native vLLM OpenAI-compatible API.
    - name: openai
      port: 8000
      targetPort: openai
    # Ollama-compatible shim served by the proxy sidecar (W1.2 plan
    # requirement: "Includes the hack/scratch/vllm-proxy.py sidecar or a
    # cleaned-up version"). Lets Open WebUI and the W1.1 measurement runbook
    # talk to vLLM via the same /api/* routes Ollama exposes.
    - name: ollama
      port: 11434
      targetPort: ollama
---
apiVersion: v1
kind: Service
metadata:
  # Headless service required by the StatefulSet for stable network IDs.
  name: vllm-headless
  namespace: lab-vllm-qwen-moe
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: qwen-moe
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: qwen-moe
  ports:
    - name: openai
      port: 8000
      targetPort: openai
    - name: ollama
      port: 11434
      targetPort: ollama
