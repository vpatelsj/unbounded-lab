apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - ingress-ollama.yaml
  - ingress-vllm.yaml
# Override the public hostname before applying:
#   kustomize edit set configmap lab-api-host --from-literal=host=<fqdn>
# (or edit configMapGenerator below). The basic-auth Secret is provisioned
# separately by `make-htpasswd.sh` because it carries credentials we don't
# want in source control; both files generated by the script are
# `*.local.yaml` and gitignored.
replacements:
  - source:
      kind: ConfigMap
      name: lab-api-host
      fieldPath: data.host
    targets:
      - select:
          kind: Ingress
          name: ollama-api
        fieldPaths:
          - spec.rules.0.host
      - select:
          kind: Ingress
          name: vllm-api
        fieldPaths:
          - spec.rules.0.host
configMapGenerator:
  - name: lab-api-host
    namespace: lab-ingress
    literals:
      # Reuses the Open WebUI public hostname so all lab traffic shares one
      # cert, one DNS record, one auth pattern. See README.md for why this
      # is the same hostname rather than a separate FQDN.
      - host=foo.bar.com
generatorOptions:
  disableNameSuffixHash: true
