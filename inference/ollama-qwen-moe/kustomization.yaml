apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: lab-ollama-qwen-moe
resources:
  - namespace.yaml
  - service.yaml
  - statefulset.yaml
# No public Ingress: Ollama is reachable only on the cluster network.
# Customer-facing access is via Open WebUI (inference/openwebui), which
# proxies Ollama server-side. For direct API access during development:
#     kubectl -n lab-ollama-qwen-moe port-forward svc/ollama 11434:11434
