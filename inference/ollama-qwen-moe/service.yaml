apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: lab-ollama-qwen-moe
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: qwen-moe
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: qwen-moe
  ports:
    - name: http
      port: 11434
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  # Headless service required by the StatefulSet for stable network IDs.
  name: ollama-headless
  namespace: lab-ollama-qwen-moe
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: qwen-moe
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: qwen-moe
  ports:
    - name: http
      port: 11434
      targetPort: http
