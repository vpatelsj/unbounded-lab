apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: lab-openwebui
  labels:
    app.kubernetes.io/name: open-webui
spec:
  replicas: 1
  strategy:
    # Recreate so the RWO PVC isn't held by two pods during rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      # Pin to the AKS system pool: Azure Disk PVCs attach there, and Open
      # WebUI is a light non-GPU workload; we don't want it consuming Spark
      # node resources. `kubernetes.azure.com/mode=system` is set by AKS on
      # system-pool nodes; arch=amd64 keeps it off the ARM64 Sparks.
      nodeSelector:
        kubernetes.azure.com/mode: system
        kubernetes.io/arch: amd64
      tolerations:
        - operator: Exists
      securityContext:
        fsGroup: 0
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Talk to the in-cluster engines directly: no public ingress
            # round-trip and no basic-auth credentials in the chat UI.
            #
            # W1.1 + W1.2: two engines, two namespaces, one UI.
            #   * Ollama on its native API (lab-ollama-qwen-moe :11434)
            #   * vLLM on its native OpenAI API (lab-vllm-qwen-moe :8000/v1)
            # The vLLM Ollama-compat shim on :11434 also exists; we wire vLLM
            # via the OpenAI surface here so the UI exercises both API
            # families end-to-end (better signal for W1.3 / W1.4).
            #
            # W1.4 will move both behind the shared public ingress + auth
            # proxy; until then OPENAI_API_KEYS is a dummy because vLLM does
            # not enforce auth in-cluster.
            - name: OLLAMA_BASE_URL
              value: http://ollama.lab-ollama-qwen-moe.svc.cluster.local:11434
            - name: OPENAI_API_BASE_URLS
              value: http://vllm.lab-vllm-qwen-moe.svc.cluster.local:8000/v1
            - name: OPENAI_API_KEYS
              value: "sk-lab-vllm-no-auth"
            - name: ENABLE_OPENAI_API
              value: "true"
            - name: WEBUI_NAME
              value: "Unbounded Lab"
            # First signup is the admin; later signups land in 'pending' until
            # the admin approves them. This is the Open WebUI default; we set
            # it explicitly so the policy is auditable.
            - name: ENABLE_SIGNUP
              value: "true"
            - name: DEFAULT_USER_ROLE
              value: pending
            # Random secret signs sessions; sourced from a Secret so we can
            # rotate without rewriting the manifest.
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: WEBUI_SECRET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data
