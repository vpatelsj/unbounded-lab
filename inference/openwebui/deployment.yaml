apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: lab-openwebui
  labels:
    app.kubernetes.io/name: open-webui
spec:
  replicas: 1
  strategy:
    # Recreate so the RWO PVC isn't held by two pods during rollout.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: open-webui
    spec:
      # Pin to the AKS system pool: Azure Disk PVCs attach there, and Open
      # WebUI is a light non-GPU workload; we don't want it consuming Spark
      # node resources. `kubernetes.azure.com/mode=system` is set by AKS on
      # system-pool nodes; arch=amd64 keeps it off the ARM64 Sparks.
      nodeSelector:
        kubernetes.azure.com/mode: system
        kubernetes.io/arch: amd64
      tolerations:
        - operator: Exists
      securityContext:
        fsGroup: 0
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Talk to the in-cluster Ollama service directly, no public ingress
            # round-trip and no basic-auth credentials in the chat UI.
            - name: OLLAMA_BASE_URL
              value: http://ollama.lab-ollama-qwen-moe.svc.cluster.local:11434
            - name: WEBUI_NAME
              value: "Unbounded Lab"
            # First signup is the admin; later signups land in 'pending' until
            # the admin approves them. This is the Open WebUI default; we set
            # it explicitly so the policy is auditable.
            - name: ENABLE_SIGNUP
              value: "true"
            - name: DEFAULT_USER_ROLE
              value: pending
            # Random secret signs sessions; sourced from a Secret so we can
            # rotate without rewriting the manifest.
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui-secrets
                  key: WEBUI_SECRET_KEY
          resources:
            requests:
              cpu: "200m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data
